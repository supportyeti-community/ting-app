    async function compressImage(file, maxWidthPx = 800, qualityLevel = 0.75) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = Math.min(1, maxWidthPx / img.width);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const outputType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
                    const quality = outputType === 'image/png' ? undefined : qualityLevel;
                    
                    canvas.toBlob(blob => {
                        resolve(new File([blob], file.name, { type: outputType }));
                    }, outputType, quality);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

                    <div style="display:flex; justify-content:flex-end; width:100%; margin-top:-4px;">
                        <button class="trash-btn" onclick="deleteDishPermanently('${dish.id}')">🗑️ Delete Dish</button>
                    </div>
                </div>
            `);
            
            pricingContainer.insertAdjacentHTML('beforeend', `
                <div class="price-card" id="price-card-${dish.id}" data-search-name="${safeName.toLowerCase()}">
                    <div style="font-weight:700; font-size:14px; color:#f8fafc;">${safeName}</div>
                    <div class="price-row">
                        <div style="display:flex; flex-direction:column; gap:2px;">
                            <label style="font-size:10px; color:#94a3b8; font-weight:700;">BASE PRICE</label>
                            <input type="text" class="price-input" id="price-${dish.id}" value="$${parseFloat(dish.price).toFixed(2)}" onchange="broadcastPriceUpdate('${dish.id}', this.value)">
                        </div>
                        <button class="deal-btn ${isPromoActive ? 'active-deal' : ''}" id="deal-${dish.id}" onclick="toggleHappyHour('${dish.id}')">
                            ${isPromoActive ? '🔥 Promo On' : 'Promo Off'}
                        </button>
                    </div>
                    <div id="promo-field-block-${dish.id}" style="display: ${isPromoActive ? 'block' : 'none'}; border-top:1px dashed var(--border-clr); padding-top:8px;">
                        <label style="font-size:10px; color: var(--warning); font-weight:700;">PROMO PRICE ($)</label>
                        <input type="text" class="promo-price-input" id="promo-price-field-${dish.id}" value="${dish.promo_price ? dish.promo_price : ''}" placeholder="e.g. 12.50" onchange="updatePromoPriceValue('${dish.id}', this.value)">
                    </div>
                </div>
            `);
        });
        
        refreshLiveAnalyticsMetrics();
    }

    async function shiftElementOrderWeights(currentIndex, orientationDirection) {
        const targetedTargetIndex = currentIndex + orientationDirection;
        if (targetedTargetIndex < 0 || targetedTargetIndex >= trackingCachedMenuItems.length) return;
        
        const holdingBlockValue = trackingCachedMenuItems[currentIndex];
        trackingCachedMenuItems[currentIndex] = trackingCachedMenuItems[targetedTargetIndex];
        trackingCachedMenuItems[targetedTargetIndex] = holdingBlockValue;
        
        const concurrencyMapPayloads = trackingCachedMenuItems.map((item, index) => {
            return supabaseInstance
                .from('menu_items')
                .update({ sort_order: index })
                .eq('id', item.id);
        });
        
        try {
            await Promise.all(concurrencyMapPayloads);
            loadLiveMenuFromDatabase();
        } catch(err) {
            console.error("Sorting concurrency write dropout:", err);
        }
    }

    async function refreshLiveAnalyticsMetrics() {
        if (!supabaseInstance) return;
        
        const { count: viewCount } = await supabaseInstance
            .from('menu_events')
            .select('*', { count: 'exact', head: true })
            .eq('event_type', 'menu_view')
            .eq('client_slug', clientSlug); // FIXED: Filtered explicitly to isolate client workspace metrics
            
        const { count: assistanceCount } = await supabaseInstance
            .from('menu_events')
            .select('*', { count: 'exact', head: true })
            .eq('event_type', 'assistance_requested')
            .eq('client_slug', clientSlug); // FIXED: Filtered explicitly to isolate client workspace metrics
            
        const { data: interactionRecords } = await supabaseInstance
            .from('menu_events')
            .select('item_id')
            .not('item_id', 'is', null)
            .eq('client_slug', clientSlug); // FIXED: Filtered explicitly to isolate client workspace metrics

        let elementClickFrequencies = {};
        let dominantItemRecord = "None";
        let topCount = 0;
        
        if (interactionRecords && interactionRecords.length > 0) {
            interactionRecords.forEach(r => {
                elementClickFrequencies[r.item_id] = (elementClickFrequencies[r.item_id] || 0) + 1;
                if(elementClickFrequencies[r.item_id] > topCount) {
                    topCount = elementClickFrequencies[r.item_id];
                    dominantItemRecord = r.item_id;
                }
            });
        }

        const viewNode = document.getElementById('metricTotalViews');
        const callNode = document.getElementById('metricAssistanceCalls');
        const topNode = document.getElementById('metricTopItem');

        if(viewNode) viewNode.innerText = viewCount || 0;
        if(callNode) callNode.innerText = assistanceCount || 0;
        
        if(topNode) {
            if (dominantItemRecord !== "None") {
                const matchingDishObj = trackingCachedMenuItems.find(dish => dish.id.toString() === dominantItemRecord.toString());
                const cleanDisplayName = matchingDishObj ? matchingDishObj.name : `ID: ${dominantItemRecord.substring(0,8)}...`;
                topNode.innerText = `${cleanDisplayName} (${topCount} taps)`;
            } else {
                topNode.innerText = "None";
            }
        }
    }

    async function updateDishFieldInline(itemId, field, value) {
        if (!supabaseInstance) return;
        let cleanValue = value.trim();
        await supabaseInstance.from('menu_items').update({ [field]: cleanValue }).eq('id', itemId);
    }

    async function deleteDishPermanently(itemId) {
        if (!confirm("Are you sure you want to delete this dish permanently from the menu?")) return;
        const { error } = await supabaseInstance.from('menu_items').delete().eq('id', itemId);
        if (error) return alert("Failed to delete item.");
        
        document.getElementById(`inv-card-${itemId}`)?.remove();
        document.getElementById(`price-card-${itemId}`)?.remove();
    }

    async function createNewDishOnCloud() {
        if (!supabaseInstance) return;
        const name = document.getElementById('newItemName').value.trim();
        const price = parseFloat(document.getElementById('newItemPrice').value.replace('$', '').trim());
        const description = document.getElementById('newItemDesc').value.trim();
        const fileInput = document.getElementById('newItemFile');
        const publishBtn = document.getElementById('publishItemBtn');

        if(!name || isNaN(price)) return alert("Specify valid values!");

        publishBtn.disabled = true;
        const originalBtnHtml = publishBtn.innerHTML;
        publishBtn.innerHTML = `<span class="publishing-spinner"></span> Processing...`;

        try {
            let finalImageUrl = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400';

            if (fileInput.files.length > 0) {
                const compressedFile = await compressImage(fileInput.files[0]);
                const fileExtension = compressedFile.name.split('.').pop();
                const uniqueFileName = `${Date.now()}-${Math.random().toString(36).substring(2, 7)}.${fileExtension}`;
                
                const { data: uploadData, error: uploadError } = await supabaseInstance.storage
                    .from('menu-pictures')
                    .upload(uniqueFileName, compressedFile, { cacheControl: '3600', upsert: false });

                if (uploadError) throw new Error("Image bucket write handshake failed.");

                const { data: publicUrlData } = supabaseInstance.storage.from('menu-pictures').getPublicUrl(uniqueFileName);
                finalImageUrl = publicUrlData.publicUrl;
            }

            let tags = [];
            if(document.getElementById('tagCeliac').checked) tags.push('celiac');
            if(document.getElementById('tagGF').checked) tags.push('gf');
            if(document.getElementById('tagVeg').checked) tags.push('veg');

            const currentSortingTargetOrder = trackingCachedMenuItems.length;

            // FIXED: Injected the required 'client_slug' property parameter to satisfy the schema non-nullable constraint row rules
            const { error } = await supabaseInstance.from('menu_items').insert([{ 
                client_slug: clientSlug,
                name, 
                price, 
                description, 
                tags, 
                image_url: finalImageUrl, 
                sort_order: currentSortingTargetOrder 
            }]);
            if (error) throw new Error("Database dynamic insertion failed.");

            alert('✅ Dish published live to menu');

            document.getElementById('newItemName').value = '';
            document.getElementById('newItemPrice').value = '';
            document.getElementById('newItemDesc').value = '';
            fileInput.value = '';
            document.getElementById('tagCeliac').checked = false;
            document.getElementById('tagGF').checked = false;
            document.getElementById('tagVeg').checked = false;
            loadLiveMenuFromDatabase();

        } catch (err) {
            console.error(err);
            alert('❌ Failed to publish. Check connection.');
        } finally {
            publishBtn.disabled = false;
            publishBtn.innerHTML = originalBtnHtml;
        }
    }

    function executeDashboardLiveSearch(queryString) {
        const query = queryString.toLowerCase().trim();
        document.querySelectorAll('.inv-item, .price-card').forEach(el => {
            const matchName = el.getAttribute('data-search-name') || '';
            el.style.display = matchName.includes(query) ? (el.classList.contains('inv-item') ? 'flex' : 'block') : 'none';
        });
    }

    async function executeUiTableMerge() {
        if (!supabaseInstance) return;
        const source = document.getElementById('mergeSource').value.trim().toString();
        const target = document.getElementById('mergeTarget').value.trim().toString();
        
        if (!source || !target) return alert("Fill fields");
        if (source === target) return alert("Cannot link table to itself");
        if (tableMerges[target] === source) return alert("Circular table dependency path blocked.");

        try {
            const { error } = await supabaseInstance
                .from('table_configurations')
                .upsert([{ source_table: source, target_table: target }]);

            if (error) throw error;

            document.getElementById('mergeSource').value = '';
            document.getElementById('mergeTarget').value = '';
        } catch (err) {
            alert("Failed to synchronize table links to cluster disk.");
        }
    }

    async function syncTableMergesFromCloudDb() {
        if (!supabaseInstance) return;
        try {
            const { data: configs, error } = await supabaseInstance
                .from('table_configurations')
                .select('source_table, target_table');

            if (error) throw error;

            tableMerges = {};
            configs.forEach(row => {
                tableMerges[row.source_table.toString()] = row.target_table.toString();
            });

            renderActiveMergesUI();
        } catch (err) {
            console.error("Failed structural blueprint sync:", err);
        }
    }

    function renderActiveMergesUI() {
        const listContainer = document.getElementById('activeMergesList');
        const itemsSpan = document.getElementById('mergesListItems');
        if (!listContainer || !itemsSpan) return;

        const keys = Object.keys(tableMerges);
        if(keys.length > 0) {
            itemsSpan.innerText = keys.map(src => `T${src}➔T${tableMerges[src]}`).join(', ');
            listContainer.style.display = 'block';
        } else {
            listContainer.style.display = 'none';
        }
    }

    function generateTableQrCodeCanvas() {
        const tableNumRaw = document.getElementById('qrTargetTable').value.trim();
        if (!tableNumRaw) return alert("Specify a table number");
        
        const wrapper = document.getElementById('qrContainerWrapper');
        const targetArea = document.getElementById('qrCodeTargetArea');
        
        targetArea.innerHTML = '';
        wrapper.style.display = 'block';
        
        const linkUrl = `https://ting.supportyeti.com/?client=${encodeURIComponent(clientSlug)}&table=${encodeURIComponent(tableNumRaw)}`;
        
        const qrcode = new QRCode(targetArea, {
            text: linkUrl,
            width: 160,
            height: 160,
            colorDark : "#000000",
            colorLight : "#ffffff"
        });
        
        setTimeout(() => {
            const canvas = targetArea.querySelector('canvas');
            if (canvas) {
                document.getElementById('qrDlBtn')?.remove();
                const dlBtn = document.createElement('button');
                dlBtn.id = 'qrDlBtn';
                dlBtn.className = 'qr-dl-btn';
                dlBtn.innerText = '📥 Save PNG';
                dlBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.download = `QR_Table_${tableNumRaw}.png`;
                    a.href = canvas.toDataURL("image/png");
                    a.click();
                };
                targetArea.appendChild(dlBtn);
            }
        }, 150);
    }

    async function syncServiceTicketsFromCloudDb() {
        const queue = document.getElementById('queue');
        if (!queue || !supabaseInstance) return;

        try {
            const { data: tickets, error } = await supabaseInstance
                .from('service_tickets')
                .select('*')
                .eq('status', 'pending')
                .order('created_at', { ascending: true });

            if (error) throw error;

            let groupedMap = {};
            tickets.forEach(ticket => {
                let srcTableStr = ticket.table_number.toString();
                let displayTable = tableMerges[srcTableStr] ? tableMerges[srcTableStr] : srcTableStr;
                let noticeText = tableMerges[srcTableStr] ? ` (Merged T${srcTableStr})` : '';

                let targetKey = `tk-group-table-${displayTable}`;
                if (!groupedMap[targetKey]) {
                    groupedMap[targetKey] = {
                        id: targetKey,
                        displayTable: displayTable,
                        ticketIds: [], 
                        requests: [],
                        isUrgent: false,
                        isBill: false,
                        isFeedback: false
                    };
                }

                groupedMap[targetKey].ticketIds.push(ticket.id);
                groupedMap[targetKey].requests.push(sanitize(ticket.request_type) + noticeText);
                
                if (ticket.request_type.includes('Allergy') || ticket.request_type.includes('Celiac')) groupedMap[targetKey].isUrgent = true;
                if (ticket.request_type.includes('Bill')) groupedMap[targetKey].isBill = true;
                if (ticket.request_type.includes('FEEDBACK')) groupedMap[targetKey].isFeedback = true;
            });

            queue.innerHTML = '';
            Object.keys(groupedMap).forEach(key => {
                const ticketData = groupedMap[key];
                let severityClass = ticketData.isUrgent ? 'urgent' : (ticketData.isBill ? 'bill' : (ticketData.isFeedback ? 'feedback-alert' : 'service'));
                let headerBadgeText = ticketData.isUrgent ? '🚨 ALLERGY CRITICAL' : (ticketData.isBill ? '💵 ACCOUNT SETTLE' : (ticketData.isFeedback ? '💬 FEEDBACK INTERCEPT' : '👋 DISPATCH SERVER'));
                let compiledLines = ticketData.requests.map(req => `• ${req}`).join('<br>');
                let idPayloadAttr = JSON.stringify(ticketData.ticketIds);

                queue.insertAdjacentHTML('afterbegin', `
                    <div class="ticket ${severityClass}" id="${ticketData.id}">
                        <div>
                            <div class="ticket-hdr"><span>${headerBadgeText}</span><span>Active</span></div>
                            <div class="ticket-title">Table ${ticketData.displayTable}</div>
                            <p class="ticket-desc" style="margin:0; font-size:13px; opacity:0.9; line-height:1.4;">${compiledLines}</p>
                        </div>
                        <button class="clear-btn" data-payload='${idPayloadAttr}' onclick="clearUnifiedTicketsGroup(this)">Mark Resolved</button>
                    </div>
                `);
            });

        } catch (err) {
            console.error("Database connection synchronization error:", err);
        }
    }

    async function clearUnifiedTicketsGroup(buttonEl) {
        if (!supabaseInstance) return;
        const targetIdsArray = JSON.parse(buttonEl.getAttribute('data-payload'));
        const parentTicketCard = buttonEl.closest('.ticket');
        if (parentTicketCard) parentTicketCard.style.opacity = '0.2';

        try {
            const { error } = await supabaseInstance
                .from('service_tickets')
                .update({ status: 'resolved' })
                .in('id', targetIdsArray);

            if (error) throw error;
            if (parentTicketCard) parentTicketCard.remove();
        } catch (err) {
            alert("Failed to resolve state across the database cluster.");
            if (parentTicketCard) parentTicketCard.style.opacity = '1';
        }
    }

    function triggerHardenedAcousticFeedback(tableNumber, requestText) {
        const currentTime = Date.now();
        const spamTrackingKey = `${tableNumber}-${requestText}`;

        if (historicalVoiceAntiSpamRegistry[spamTrackingKey] && 
            (currentTime - historicalVoiceAntiSpamRegistry[spamTrackingKey] < 180000)) {
            return; 
        }
        historicalVoiceAntiSpamRegistry[spamTrackingKey] = currentTime;

        let priority = "medium";
        let speechPhrase = "";

        if (requestText.includes('Allergy') || requestText.includes('Celiac')) {
            priority = "high";
            speechPhrase = `Alert. Table ${tableNumber} has an urgent allergy question. Repeat. Table ${tableNumber} allergy inquiry.`;
        } else if (requestText.includes('Bill')) {
            speechPhrase = `Bill requested at table ${tableNumber}.`;
        } else if (requestText.includes('Server') || requestText.includes('Assistance')) {
            speechPhrase = `Table ${tableNumber} requests a server.`;
        } else {
            playLowPriorityChime();
            return;
        }

        localAudioSpeechBuffer.push({ text: speechPhrase, priority: priority });
        localAudioSpeechBuffer.sort((a, b) => (b.priority === 'high') - (a.priority === 'high'));
        processSpeechQueueSequentially();
    }

    function processSpeechQueueSequentially() {
        if (isSpeechEngineProcessing || localAudioSpeechBuffer.length === 0) return;
        if (!('speechSynthesis' in window)) return;

        isSpeechEngineProcessing = true;
        const currentItem = localAudioSpeechBuffer.shift();
        const utterance = new SpeechSynthesisUtterance(currentItem.text);

        utterance.rate = currentItem.priority === "high" ? 0.82 : 0.92;
        utterance.pitch = currentItem.priority === "high" ? 1.05 : 1.0;

        utterance.onend = () => {
            isSpeechEngineProcessing = false;
            setTimeout(processSpeechQueueSequentially, 300); 
        };

        utterance.onerror = () => { isSpeechEngineProcessing = false; };
        window.speechSynthesis.speak(utterance);
    }

    function playLowPriorityChime() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } catch(e){}
    }

    async function toggleItemStock(itemId, dishName, isChecked) {
        if (!supabaseInstance) return;
        
        if (isChecked && !confirm(`Mark "${dishName}" as out of stock? This hides it from customer menus immediately.`)) {
            loadLiveMenuFromDatabase();
            return;
        }

        await supabaseInstance.from('menu_items').update({ is_out_of_stock: isChecked }).eq('id', itemId);
    }

    async function broadcastPriceUpdate(itemId, targetPrice) {
        if (!supabaseInstance) return;
        const cleanPrice = parseFloat(targetPrice.replace('$', '').trim());
        if(isNaN(cleanPrice)) return alert("Invalid price numeric format");

        await supabaseInstance.from('menu_items').update({ price: cleanPrice }).eq('id', itemId);
    }

    async function toggleHappyHour(itemId) {
        if (!supabaseInstance) return;
        const btn = document.getElementById(`deal-${itemId}`);
        const nextState = !btn.classList.contains('active-deal');
        const promoBlock = document.getElementById(`promo-field-block-${itemId}`);

        const { error } = await supabaseInstance.from('menu_items').update({ is_promo: nextState }).eq('id', itemId);
        if (error) return alert("Sync error");

        btn.classList.toggle('active-deal', nextState);
        btn.innerText = nextState ? "🔥 Promo On" : "Promo Off";
        if(promoBlock) promoBlock.style.display = nextState ? 'block' : 'none';
    }

    async function updatePromoPriceValue(itemId, val) {
        if (!supabaseInstance) return;
        const cleanPromoPrice = parseFloat(val.trim());
        if(isNaN(cleanPromoPrice)) return alert("Please specify a numeric pricing value");

        await supabaseInstance.from('menu_items').update({ promo_price: cleanPromoPrice }).eq('id', itemId);
    }
